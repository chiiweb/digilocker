
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DigiLocker — File Explorer</title>
<meta name="description" content="Your personal DigiLocker — securely store, access and share documents." />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Cpath d='M6 10h8l2 3h10a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V12a2 2 0 0 1 2-2z' fill='white'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Instrument+Serif&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
:root{
  --bg:#eef1f6; --chrome:rgba(255,255,255,.72); --chrome-2:rgba(255,255,255,.88);
  --panel:#fff; --border:rgba(15,23,42,.08); --border-strong:rgba(15,23,42,.16);
  --text:#0f172a; --text-muted:#475569; --text-faint:#94a3b8;
  --accent:#2563eb; --accent-hover:#1d4ed8; --accent-soft:#dbe7ff; --accent-soft-2:#eef3ff;
  --selection:#dbeafe; --selection-border:#93c5fd;
  --shadow:0 24px 60px -20px rgba(15,23,42,.25),0 8px 24px -12px rgba(15,23,42,.12);
  --radius:14px; --radius-sm:8px;
  --font:"Inter Tight","Segoe UI",-apple-system,system-ui,sans-serif;
  --font-display:"Instrument Serif",serif;
  --app-bg:radial-gradient(1200px 800px at 0% 0%,#e0e7ff 0%,transparent 55%),
          radial-gradient(1000px 700px at 100% 100%,#dbeafe 0%,transparent 55%),
          linear-gradient(180deg,#f5f7fb 0%,#eef1f6 100%);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0b1020; --chrome:rgba(20,26,45,.72); --chrome-2:rgba(28,35,56,.88);
    --panel:#141a2d; --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.16);
    --text:#f1f5f9; --text-muted:#cbd5e1; --text-faint:#64748b;
    --accent:#60a5fa; --accent-hover:#93c5fd; --accent-soft:rgba(96,165,250,.18); --accent-soft-2:rgba(96,165,250,.10);
    --selection:rgba(96,165,250,.22); --selection-border:rgba(96,165,250,.45);
    --shadow:0 24px 60px -20px rgba(0,0,0,.6),0 8px 24px -12px rgba(0,0,0,.4);
    --app-bg:radial-gradient(1200px 800px at 0% 0%,#1e1b4b 0%,transparent 55%),
            radial-gradient(1000px 700px at 100% 100%,#0c1e3e 0%,transparent 55%),
            linear-gradient(180deg,#060914 0%,#0b1020 100%);
  }
}
*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;color:var(--text);background:var(--app-bg);background-attachment:fixed;overflow:hidden;}

/* AUTH */
.auth-overlay{position:fixed;inset:0;background:radial-gradient(900px 600px at 15% 20%,rgba(99,102,241,.55),transparent 60%),radial-gradient(900px 600px at 85% 85%,rgba(59,130,246,.55),transparent 60%),linear-gradient(135deg,#0b1226 0%,#1e1b4b 50%,#0c2657 100%);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.auth-overlay.hidden{display:none;}
.auth-card{width:100%;max-width:420px;background:rgba(255,255,255,.08);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:40px 36px;box-shadow:0 30px 80px rgba(0,0,0,.45);color:#fff;}
.auth-card .brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:6px;}
.auth-card .brand svg{width:32px;height:32px;color:#93c5fd;}
.auth-card .brand h1{font-family:var(--font-display);font-size:34px;margin:0;font-weight:400;letter-spacing:-.02em;background:linear-gradient(180deg,#fff,#cbd5e1);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.auth-card .subtitle{text-align:center;color:rgba(255,255,255,.6);font-size:13px;margin:4px 0 28px;}
.auth-card label{display:block;font-size:11px;color:rgba(255,255,255,.6);margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.auth-card input{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:14px;font-family:var(--font);background:rgba(255,255,255,.06);color:#fff;margin-bottom:16px;outline:none;transition:all .2s;}
.auth-card input::placeholder{color:rgba(255,255,255,.35);}
.auth-card input:focus{border-color:rgba(147,197,253,.6);background:rgba(255,255,255,.10);box-shadow:0 0 0 4px rgba(147,197,253,.15);}
.auth-card .btn-row{display:flex;gap:10px;margin-top:8px;}
.auth-card .auth-btn{flex:1;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s ease;}
.auth-card .auth-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px);}
.auth-card .auth-btn.primary{background:linear-gradient(180deg,#3b82f6,#2563eb);border-color:rgba(59,130,246,.6);box-shadow:0 8px 24px -8px rgba(59,130,246,.7);}
.auth-card .auth-btn.primary:hover{background:linear-gradient(180deg,#60a5fa,#3b82f6);}
.auth-card .auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.auth-card .divider{text-align:center;color:rgba(255,255,255,.4);font-size:11px;margin:20px 0 14px;text-transform:uppercase;letter-spacing:.15em;position:relative;}
.auth-card .divider::before,.auth-card .divider::after{content:"";position:absolute;top:50%;width:calc(50% - 30px);height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);}
.auth-card .divider::before{left:0;} .auth-card .divider::after{right:0;}
.auth-card .google-btn{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.auth-card .google-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-1px);}
.auth-error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:14px;display:none;}
.auth-error.show{display:block;}
.auth-toggle{text-align:center;margin-top:16px;font-size:13px;color:rgba(255,255,255,.5);}
.auth-toggle a{color:#93c5fd;cursor:pointer;text-decoration:none;font-weight:600;}
.auth-toggle a:hover{text-decoration:underline;}

/* WINDOW */
.window{width:min(1400px,96vw);height:min(900px,94vh);margin:3vh auto;display:grid;grid-template-rows:36px auto auto 1fr 28px;background:var(--chrome);backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
.window.hidden{display:none;}

/* TABS */
.titlebar{display:flex;align-items:center;padding:0 0 0 8px;font-size:12px;color:var(--text-muted);user-select:none;background:var(--chrome);overflow:hidden;}
.tabs-strip{display:flex;align-items:flex-end;gap:2px;flex:1;overflow-x:auto;height:36px;padding-top:6px;}
.tabs-strip::-webkit-scrollbar{display:none;}
.tab{height:30px;padding:0 10px 0 12px;display:flex;align-items:center;gap:8px;background:transparent;border:1px solid transparent;border-bottom:0;border-radius:10px 10px 0 0;color:var(--text-muted);font-weight:500;font-size:12.5px;cursor:pointer;white-space:nowrap;max-width:200px;min-width:120px;transition:background .1s;}
.tab:hover{background:rgba(15,23,42,.05);}
.tab.active{background:var(--chrome-2);border-color:var(--border);color:var(--text);font-weight:600;}
.tab svg.tab-icon{width:14px;height:14px;color:var(--accent);flex-shrink:0;}
.tab .tab-name{overflow:hidden;text-overflow:ellipsis;flex:1;}
.tab .tab-close{width:18px;height:18px;border-radius:4px;border:0;background:transparent;color:var(--text-faint);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:14px;line-height:1;}
.tab .tab-close:hover{background:rgba(0,0,0,.12);color:var(--text);}
.tab-add{width:28px;height:28px;margin:0 6px;border-radius:6px;border:0;background:transparent;color:var(--text-muted);cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;}
.tab-add:hover{background:rgba(15,23,42,.08);color:var(--text);}
.titlebar .winbtns{display:flex;}
.titlebar .winbtns button{width:46px;height:36px;background:transparent;border:0;color:var(--text-muted);cursor:default;font-family:var(--font);font-size:13px;}
.titlebar .winbtns button:hover{background:rgba(15,23,42,.06);}
.titlebar .winbtns button.close-btn:hover{background:#e81123;color:#fff;}

/* COMMAND */
.commandbar{display:flex;align-items:center;gap:4px;padding:8px 14px;background:var(--chrome-2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.cmd-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.cmd-btn:hover:not(:disabled){background:rgba(15,23,42,.05);}
.cmd-btn:disabled{opacity:.4;cursor:not-allowed;}
.cmd-btn.primary{background:linear-gradient(180deg,var(--accent),var(--accent-hover));color:#fff;border-color:var(--accent-hover);box-shadow:0 6px 16px -8px rgba(37,99,235,.6);}
.cmd-btn.primary:hover{filter:brightness(1.08);transform:translateY(-1px);}
.cmd-btn svg{width:16px;height:16px;}
.cmd-sep{width:1px;height:22px;background:var(--border);margin:0 6px;}

/* ADDRESS */
.addressbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--chrome-2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav-arrows{display:flex;gap:2px;}
.nav-arrows button{width:28px;height:28px;border-radius:var(--radius-sm);border:0;background:transparent;cursor:pointer;color:var(--text-muted);display:inline-flex;align-items:center;justify-content:center;}
.nav-arrows button:hover:not(:disabled){background:rgba(0,0,0,.06);color:var(--text);}
.nav-arrows button:disabled{opacity:.35;cursor:default;}
.nav-arrows svg{width:14px;height:14px;}
.crumbs{flex:1;display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 8px;gap:4px;overflow:hidden;}
.crumb{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:4px;cursor:pointer;}
.crumb:hover{background:rgba(0,0,0,.06);}
.crumb svg{width:14px;height:14px;color:var(--accent);}
.crumb-sep{color:var(--text-faint);font-size:10px;}
.searchbox{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px;width:240px;}
.searchbox input{border:0;outline:0;background:transparent;flex:1;color:var(--text);font-family:var(--font);font-size:13px;}
.searchbox svg{width:14px;height:14px;color:var(--text-faint);}

/* BODY */
.body{display:grid;grid-template-columns:240px 1fr;background:var(--panel);min-height:0;}
.sidebar{border-right:1px solid var(--border);background:var(--chrome);padding:8px 6px;overflow-y:auto;}
.side-group{margin-bottom:4px;}
.side-group-title{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--text-faint);font-weight:700;padding:10px 12px 6px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
.side-group-title .chev{width:10px;height:10px;transition:transform .15s;}
.side-group.collapsed .chev{transform:rotate(-90deg);}
.side-group.collapsed .side-items{display:none;}
.side-item{display:flex;align-items:center;gap:10px;padding:6px 10px 6px 18px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text);font-size:13px;transition:background .1s;position:relative;}
.side-item.indent-2{padding-left:30px;}
.side-item:hover{background:rgba(0,0,0,.05);}
.side-item.active{background:var(--accent-soft-2);font-weight:600;}
.side-item.active::before{content:"";position:absolute;left:4px;top:6px;bottom:6px;width:3px;background:var(--accent);border-radius:2px;}
.side-item svg{width:16px;height:16px;color:var(--accent);flex-shrink:0;}
.side-item .count{margin-left:auto;font-size:11px;color:var(--text-faint);font-weight:500;}

/* MAIN */
.main{display:flex;flex-direction:column;min-width:0;min-height:0;}
.main-toolbar{display:flex;align-items:center;gap:6px;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--chrome-2);font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
.view-toggle{display:flex;gap:2px;margin-left:auto;}
.view-toggle button{width:28px;height:26px;border:0;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.view-toggle button:hover{background:rgba(0,0,0,.06);color:var(--text);}
.view-toggle button.active{background:var(--accent-soft);color:var(--accent);}
.view-toggle svg{width:15px;height:15px;}

.filearea{flex:1;overflow:auto;padding:12px 14px 20px;position:relative;}
.filearea.drag-over{outline:2px dashed var(--accent);outline-offset:-12px;background:var(--accent-soft-2);}
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;}
.file-card{padding:12px 6px 10px;border-radius:var(--radius-sm);text-align:center;user-select:none;border:1px solid transparent;transition:background .1s;position:relative;cursor:default;}
.file-card:hover{background:rgba(0,0,0,.04);}
.file-card.selected{background:var(--selection);border-color:var(--selection-border);}
.file-card .icon{width:56px;height:56px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:6px;}
.file-card .icon svg,.file-card .icon img{width:100%;height:100%;}
.file-card .icon img.file-preview-img{object-fit:cover;border-radius:4px;display:block;}
.file-card .name{font-size:12px;word-break:break-word;line-height:1.3;max-height:2.6em;overflow:hidden;}
.file-card .star-badge{position:absolute;top:4px;right:4px;color:#f59e0b;font-size:13px;display:none;}
.file-card.starred .star-badge{display:block;}
.file-card .rename-input{width:100%;font-family:var(--font);font-size:12px;border:1px solid var(--accent);border-radius:4px;padding:2px 4px;outline:none;text-align:center;}

.files-list{width:100%;}
.files-list .row-head,.files-list .row{display:grid;grid-template-columns:1fr 150px 100px 80px;align-items:center;padding:6px 10px;font-size:13px;border-radius:4px;}
.files-list .row-head{font-size:12px;color:var(--text-faint);border-bottom:1px solid var(--border);font-weight:600;border-radius:0;position:sticky;top:0;background:var(--panel);z-index:1;}
.files-list .row{cursor:default;transition:background .1s;}
.files-list .row:hover{background:rgba(0,0,0,.04);}
.files-list .row.selected{background:var(--selection);}
.files-list .name-cell{display:flex;align-items:center;gap:10px;min-width:0;}
.files-list .name-cell svg{width:20px;height:20px;flex-shrink:0;}
.files-list .name-cell .thumb-preview{width:20px;height:20px;object-fit:cover;border-radius:3px;flex-shrink:0;}
.files-list .name-cell span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.files-list .name-cell .star-inline{color:#f59e0b;margin-left:4px;}

.empty-state{text-align:center;padding:72px 20px;color:var(--text-faint);display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;}
.empty-state .big-icon{font-size:64px;margin-bottom:14px;opacity:.55;}
.empty-state h3{margin:8px 0 6px;color:var(--text-muted);font-family:var(--font-display);font-weight:400;font-size:26px;letter-spacing:-.01em;}
.empty-state p{font-size:13px;color:var(--text-faint);margin:0 0 20px;}
.empty-upload-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 28px;border-radius:12px;background:linear-gradient(180deg,var(--accent),var(--accent-hover));color:#fff;border:none;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 8px 24px -8px rgba(37,99,235,.6);transition:all .2s;}
.empty-upload-btn:hover{filter:brightness(1.1);transform:translateY(-2px);}

.statusbar{border-top:1px solid var(--border);background:var(--chrome-2);padding:4px 14px;display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
.statusbar .right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.user-chip{display:inline-flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:20px;background:var(--bg);border:1px solid var(--border);font-size:12px;}
.user-chip .avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;}
.user-chip .signout{border:0;background:transparent;color:var(--text-faint);cursor:pointer;padding:0 2px;font-size:12px;font-family:var(--font);}
.user-chip .signout:hover{color:#e81123;}

.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--panel);padding:10px 18px;border-radius:8px;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.spinner{width:36px;height:36px;margin:0 auto 16px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CONTEXT MENU */
.ctx-menu{position:fixed;z-index:1000;min-width:220px;background:var(--panel);border:1px solid var(--border-strong);border-radius:10px;box-shadow:var(--shadow);padding:6px;font-size:13px;color:var(--text);user-select:none;display:none;}
.ctx-menu.show{display:block;}
.ctx-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;}
.ctx-item:hover{background:var(--accent-soft-2);}
.ctx-item.danger{color:#dc2626;}
.ctx-item.danger:hover{background:rgba(239,68,68,.1);}
.ctx-item svg{width:15px;height:15px;color:var(--text-muted);flex-shrink:0;}
.ctx-item.danger svg{color:#dc2626;}
.ctx-item .kbd{margin-left:auto;font-size:11px;color:var(--text-faint);font-family:monospace;}
.ctx-sep{height:1px;background:var(--border);margin:4px 2px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:24px;width:100%;max-width:420px;}
.modal h3{margin:0 0 12px;font-size:18px;font-weight:600;}
.modal p{margin:0 0 14px;color:var(--text-muted);font-size:13px;}
.modal input{width:100%;padding:10px 12px;border:1px solid var(--border-strong);border-radius:8px;font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text);outline:none;}
.modal input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.modal .actions button{padding:8px 16px;border-radius:8px;border:1px solid var(--border-strong);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;}
.modal .actions button.primary{background:linear-gradient(180deg,var(--accent),var(--accent-hover));color:#fff;border-color:var(--accent-hover);}
.modal .actions button:hover{filter:brightness(1.05);}

::-webkit-scrollbar{width:12px;}
::-webkit-scrollbar-thumb{background:transparent;border:3px solid transparent;border-radius:8px;background-clip:padding-box;}
.filearea::-webkit-scrollbar-thumb,.sidebar::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border:3px solid transparent;background-clip:padding-box;}

@media (max-width:700px){
  .body{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .window{width:98vw;height:96vh;margin:2vh auto;}
  .files-list .row-head,.files-list .row{grid-template-columns:1fr 100px 70px 60px;font-size:11px;}
}
</style>
</head>
<body>

<!-- ===== AUTH ===== -->
<div class="auth-overlay" id="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4 6v6c0 5 3.5 9.5 8 10 4.5-.5 8-5 8-10V6l-8-4z"/></svg>
      <h1>DigiLocker</h1>
    </div>
    <div class="subtitle">Sign in to access your secure documents</div>

<script type="module">

const SUPABASE_URL = "https://edvrzshtnralwsvlgbzo.supabase.co";

// Tab system: each tab has its own folder path and filter

function newTab(opts={}) {
  const t = {
    id: tabSeq++,
    name: opts.name || 'My Documents',
    path: opts.path || '',       // subfolder inside user root, e.g. "" or "photos/2024"
    filter: opts.filter || 'all', // all, starred, recent, images, documents, videos, audio, archives
    view: 'grid',
    history: [opts.path || ''],
    historyIdx: 0,
    files: [],
    folders: [],
    selected: new Set(),
    search: '',
  };
  return t;
}

function activeTab() { return tabs.find(t => t.id === activeTabId); }

// Starred files: stored per user in localStorage
function starKey() { return `digilocker_starred_${userId}`; }
function getStarred() { try { return new Set(JSON.parse(localStorage.getItem(starKey())||'[]')); } catch { return new Set(); } }
function setStarred(set) { localStorage.setItem(starKey(), JSON.stringify([...set])); }
function isStarred(path) { return getStarred().has(path); }
function toggleStar(path) { const s=getStarred(); s.has(path)?s.delete(path):s.add(path); setStarred(s); }

// ============ HELPERS ============
function showToast(msg){ toast.textContent=msg; toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.classList.remove('show'),2800); }
function showAuthError(m){ authError.textContent=m; authError.classList.add('show'); }
function clearAuthError(){ authError.classList.remove('show'); }
function setAuthLoading(l){ ['login-btn','signup-btn','google-btn'].forEach(id=>$(id).disabled=l); }
function formatBytes(b){ if(!b)return '—'; const u=['B','KB','MB','GB']; let i=0; while(b>=1024 && i<u.length-1){b/=1024;i++;} return `${b.toFixed(b<10?1:0)} ${u[i]}`; }
function formatDate(d){ if(!d) return '—'; const dt=new Date(d); return dt.toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'}); }
function getExt(name){ const i=name.lastIndexOf('.'); return i>=0?name.slice(i+1).toLowerCase():''; }
function escapeHtml(s){ return String(s).replace(/[&<>'"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }

const TYPE_LABELS={pdf:'PDF',jpg:'JPEG',jpeg:'JPEG',png:'PNG',gif:'GIF',webp:'WebP',svg:'SVG',doc:'DOC',docx:'DOCX',xls:'XLS',xlsx:'XLSX',txt:'TEXT',zip:'ZIP',rar:'RAR','7z':'7Z',tar:'TAR',gz:'GZ',mp4:'MP4',mp3:'MP3',mov:'MOV',avi:'AVI',mkv:'MKV',webm:'WebM',wav:'WAV',ogg:'OGG',flac:'FLAC',json:'JSON',xml:'XML',html:'HTML',css:'CSS',js:'JS'};
function fileTypeLabel(ext){ return TYPE_LABELS[ext] || (ext?ext.toUpperCase():'FILE'); }

const IMAGE_EXTS=new Set(['jpg','jpeg','png','gif','webp','avif','svg']);
const VIDEO_EXTS=new Set(['mp4','mov','avi','mkv','webm']);
const AUDIO_EXTS=new Set(['mp3','wav','ogg','flac','m4a']);
const DOC_EXTS=new Set(['pdf','doc','docx','txt','xls','xlsx','ppt','pptx','rtf','md']);
const ARCHIVE_EXTS=new Set(['zip','rar','7z','tar','gz']);

function isImage(ext){ return IMAGE_EXTS.has(ext); }
function categoryOf(ext){
  if(IMAGE_EXTS.has(ext))return'images';
  if(VIDEO_EXTS.has(ext))return'videos';
  if(AUDIO_EXTS.has(ext))return'audio';
  if(ARCHIVE_EXTS.has(ext))return'archives';
  if(DOC_EXTS.has(ext))return'documents';
  return'other';
}

function fileIconSvg(ext, label){
  const color='#0067c0';
  const l=(label||fileTypeLabel(ext)).slice(0,4);
  return `<svg viewBox="0 0 48 56" xmlns="http://www.w3.org/2000/svg"><path d="M4 4h26l14 14v32a4 4 0 0 1-4 4H4a4 4 0 0 1-4-4V8a4 4 0 0 1 4-4z" fill="${color}" opacity=".95"/><path d="M30 4v14h14L30 4z" fill="#fff" opacity=".35"/><text x="24" y="40" text-anchor="middle" fill="#fff" font-family="Inter Tight, sans-serif" font-size="10" font-weight="700">${l}</text></svg>`;
}
function folderIconSvg(){
  return `<svg viewBox="0 0 48 40" xmlns="http://www.w3.org/2000/svg"><path d="M4 8a4 4 0 0 1 4-4h10l4 4h18a4 4 0 0 1 4 4v22a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z" fill="#fbbf24"/><path d="M4 14h40v20a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V14z" fill="#f59e0b"/></svg>`;
}
function fileIcon(ext, url){
  if(isImage(ext) && url) return `<img src="${url}" alt="" class="file-preview-img" loading="lazy" onerror="this.outerHTML='${fileIconSvg(ext).replace(/'/g,"\\'")}';">`;
  return fileIconSvg(ext);
}

// ============ AUTH ============
function updateAuthMode(){ $('auth-switch-text').textContent=isSignUpMode?'Already have an account?':"Don't have an account?"; $('auth-switch-link').textContent=isSignUpMode?' Sign in':' Sign up'; }
$('auth-switch-link').addEventListener('click',()=>{isSignUpMode=!isSignUpMode;clearAuthError();updateAuthMode();});
$('login-btn').addEventListener('click', async()=>{
  clearAuthError();
  const email=emailInput.value.trim(), pass=passwordInput.value;
  if(!email||!pass){showAuthError('Enter email and password');return;}
  setAuthLoading(true);
  const{error}=await supabase.auth.signInWithPassword({email,password:pass});
  if(error) showAuthError(error.message);
  setAuthLoading(false);
});
$('signup-btn').addEventListener('click', async()=>{
  clearAuthError();
  const email=emailInput.value.trim(), pass=passwordInput.value;
  if(!email||!pass){showAuthError('Enter email and password');return;}
  if(pass.length<6){showAuthError('Password min 6 chars');return;}
  setAuthLoading(true);
  const{error}=await supabase.auth.signUp({email,password:pass,options:{emailRedirectTo:window.location.href}});
  if(error) showAuthError(error.message);
  else showToast('Account created! Check email to confirm.');
  setAuthLoading(false);
});
$('google-btn').addEventListener('click', async()=>{
  clearAuthError();
  const{error}=await supabase.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.href}});
  if(error) showAuthError(error.message);
});
$('logout-btn').addEventListener('click', async()=>{ await supabase.auth.signOut(); showToast('Signed out.'); });
[emailInput,passwordInput].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')$('login-btn').click();}));

supabase.auth.onAuthStateChange((_e, session)=>{
  if(session?.user){
    userId = session.user.id;
    authScreen.classList.add('hidden');
    dashboard.classList.remove('hidden');
    const name = session.user.user_metadata?.full_name || session.user.email || 'user';
    userDisplay.textContent = name;
    userAvatar.textContent = name[0].toUpperCase();
    if(tabs.length===0){ const t=newTab(); tabs.push(t); activeTabId=t.id; }
    renderSidebar();
    renderTabs();
    loadCurrentTab();
  } else {
    userId = null;
    authScreen.classList.remove('hidden');
    dashboard.classList.add('hidden');
    tabs = []; activeTabId = null;
  }
});

// ============ TABS UI ============
function renderTabs(){
  const strip=$('tabs-strip');
  strip.innerHTML = tabs.map(t=>`
    <div class="tab ${t.id===activeTabId?'active':''}" data-tab="${t.id}" title="${escapeHtml(t.name)}">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      <span class="tab-name">${escapeHtml(t.name)}</span>
      ${tabs.length>1?`<button class="tab-close" data-close="${t.id}" title="Close">×</button>`:''}
    </div>`).join('');
  strip.querySelectorAll('.tab').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('.tab-close')) return;
      activeTabId = Number(el.dataset.tab);
      renderTabs(); renderSidebar(); loadCurrentTab();
    });
  });
  strip.querySelectorAll('.tab-close').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const id=Number(b.dataset.close);
      const idx=tabs.findIndex(t=>t.id===id);
      tabs.splice(idx,1);
      if(activeTabId===id) activeTabId=tabs[Math.max(0,idx-1)].id;
      renderTabs(); renderSidebar(); loadCurrentTab();
    });
  });
}
$('tab-add').addEventListener('click',()=>{
  const cur=activeTab();
  const t=newTab({name:cur?cur.name:'My Documents',path:cur?cur.path:'',filter:cur?cur.filter:'all'});
  tabs.push(t); activeTabId=t.id;
  renderTabs(); loadCurrentTab();
});

// ============ SIDEBAR ============
const SIDEBAR_SECTIONS = [
  { id:'quick', title:'Quick access', items:[
    { id:'all', label:'My Documents', icon:'folder', filter:'all' },
    { id:'starred', label:'Starred', icon:'star', filter:'starred' },

];

const ICONS = {
  folder:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>',

};

// ============ DATA LOADING ============
async function loadCurrentTab(){
  const t = activeTab();
  if(!t || !userId) return;
  filearea.innerHTML = `<div class="empty-state"><div class="spinner"></div><p>Loading…</p></div>`;
  statusText.textContent='Loading...';
  const folderPath = `${userId}${t.path?'/'+t.path:''}`;
  const { data, error } = await supabase.storage.from(BUCKET).list(folderPath, { limit:1000, sortBy:{column:'name',order:'asc'} });
  if(error){
    filearea.innerHTML = `<div class="empty-state"><div class="big-icon">⚠️</div><h3>Failed to load</h3><p>${escapeHtml(error.message)}</p></div>`;
    statusText.textContent='Error'; return;
  }
  const entries = (data||[]).filter(f=>f.name!=='.emptyFolderPlaceholder');
  t.files = []; t.folders = [];
  for(const e of entries){
    // folders: id is null
    if(!e.id || e.metadata===null){
      t.folders.push({ name:e.name, path:`${t.path?t.path+'/':''}${e.name}` });
    } else {
      const fullPath = `${folderPath}/${e.name}`;
      const { data:{publicUrl} } = supabase.storage.from(BUCKET).getPublicUrl(fullPath);
      t.files.push({
        name:e.name, url:publicUrl,
        size:e.metadata?.size||0,
        updated:e.updated_at||e.created_at,
        ext:getExt(e.name),
        path:fullPath,
        relPath:`${t.path?t.path+'/':''}${e.name}`,
      });
    }
  }
  t.selected.clear();
  renderCrumbs();
  render();
  statusText.textContent='Ready';
}

function renderCrumbs(){
  const t=activeTab(); if(!t)return;
  const parts = t.path?t.path.split('/'):[];
  const crumbs=$('crumbs');
  let html = `<div class="crumb" data-jump=""><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg><span>${escapeHtml(t.name)}</span></div>`;
  let acc='';
  for(const p of parts){
    acc = acc?`${acc}/${p}`:p;
    html += `<span class="crumb-sep">›</span><div class="crumb" data-jump="${escapeHtml(acc)}"><span>${escapeHtml(p)}</span></div>`;
  }
  crumbs.innerHTML=html;
  crumbs.querySelectorAll('.crumb').forEach(c=>{
    c.addEventListener('click',()=>navigateTo(c.dataset.jump));
  });
  $('folder-label').textContent = parts.length?parts[parts.length-1]:t.name;
}

function navigateTo(path){
  const t=activeTab(); if(!t)return;
  if(t.path===path) return;
  t.path = path;
  t.history = t.history.slice(0, t.historyIdx+1);
  t.history.push(path); t.historyIdx = t.history.length-1;
  loadCurrentTab();
}

$('nav-back').addEventListener('click',()=>{
  const t=activeTab(); if(!t||t.historyIdx<=0)return;
  t.historyIdx--; t.path=t.history[t.historyIdx]; loadCurrentTab();
});
$('nav-forward').addEventListener('click',()=>{
  const t=activeTab(); if(!t||t.historyIdx>=t.history.length-1)return;
  t.historyIdx++; t.path=t.history[t.historyIdx]; loadCurrentTab();
});
$('nav-up').addEventListener('click',()=>{
  const t=activeTab(); if(!t||!t.path)return;
  const parts=t.path.split('/'); parts.pop();
  navigateTo(parts.join('/'));
});

// ============ FILTERED VIEW ============
function visibleEntries(){
  const t=activeTab(); if(!t)return{folders:[],files:[]};
  let files=[...t.files], folders=[...t.folders];
  const starred=getStarred();
  switch(t.filter){
    case 'starred': files=files.filter(f=>starred.has(f.path)); folders=[]; break;
    case 'recent': files=[...files].sort((a,b)=>new Date(b.updated)-new Date(a.updated)).slice(0,50); folders=[]; break;
    case 'images': files=files.filter(f=>IMAGE_EXTS.has(f.ext)); folders=[]; break;
    case 'videos': files=files.filter(f=>VIDEO_EXTS.has(f.ext)); folders=[]; break;
    case 'audio': files=files.filter(f=>AUDIO_EXTS.has(f.ext)); folders=[]; break;
    case 'archives': files=files.filter(f=>ARCHIVE_EXTS.has(f.ext)); folders=[]; break;
    case 'documents': files=files.filter(f=>DOC_EXTS.has(f.ext)); folders=[]; break;
    case 'shared': files=[]; folders=[]; break;
  }
  const q=(t.search||'').toLowerCase().trim();
  if(q){ files=files.filter(f=>f.name.toLowerCase().includes(q)); folders=folders.filter(f=>f.name.toLowerCase().includes(q)); }
  return {folders, files};
}

// ============ RENDER ============
function render(){
  const t=activeTab(); if(!t)return;
  const {folders, files} = visibleEntries();
  const total=folders.length+files.length;
  itemCount.textContent=`${total} item${total===1?'':'s'}`;

  if(total===0){
    if(t.search){
      filearea.innerHTML=`<div class="empty-state"><div class="big-icon">🔍</div><h3>No matches</h3><p>Try a different search.</p></div>`;
    } else if(t.filter==='starred'){
      filearea.innerHTML=`<div class="empty-state"><div class="big-icon">⭐</div><h3>No starred files</h3><p>Right-click a file and choose Star to add favorites.</p></div>`;
    } else if(t.filter==='shared'){
      filearea.innerHTML=`<div class="empty-state"><div class="big-icon">👥</div><h3>Nothing shared yet</h3><p>Shared files will appear here.</p></div>`;
    } else {
      filearea.innerHTML=`<div class="empty-state"><div class="big-icon">📁</div><h3>Folder empty</h3><p>Upload your first file</p><button class="empty-upload-btn" id="empty-upload-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v12m0-12l-4 4m4-4l4 4M4 20h16"/></svg>Upload files</button></div>`;
      $('empty-upload-btn')?.addEventListener('click',()=>filePicker.click());
    }
    updateSelection(); return;
  }

  const starred=getStarred();
  if(t.view==='grid'){
    let html='<div class="files-grid">';
    for(const f of folders){
      html += `<div class="file-card" data-folder="${escapeHtml(f.name)}" data-path="${escapeHtml(f.path)}">
        <div class="icon">${folderIconSvg()}</div>
        <div class="name">${escapeHtml(f.name)}</div>
      </div>`;
    }
    for(const f of files){
      const sel = t.selected.has(f.relPath) ? 'selected':'';
      const star = starred.has(f.path) ? 'starred':'';
      html += `<div class="file-card ${sel} ${star}" data-file="${escapeHtml(f.relPath)}">
        <span class="star-badge">★</span>
        <div class="icon">${fileIcon(f.ext, f.url)}</div>
        <div class="name">${escapeHtml(f.name)}</div>
      </div>`;
    }
    html += '</div>';
    filearea.innerHTML = html;
  } else {
    let html = `<div class="files-list">
      <div class="row-head"><div>Name</div><div>Date modified</div><div>Type</div><div>Size</div></div>`;
    for(const f of folders){
      html += `<div class="row" data-folder="${escapeHtml(f.name)}" data-path="${escapeHtml(f.path)}">
        <div class="name-cell">${folderIconSvg()}<span>${escapeHtml(f.name)}</span></div>
        <div>—</div><div>Folder</div><div>—</div>
      </div>`;
    }
    for(const f of files){
      const sel = t.selected.has(f.relPath) ? 'selected':'';
      const star = starred.has(f.path);
      const thumb = isImage(f.ext) && f.url ? `<img src="${f.url}" class="thumb-preview" loading="lazy" alt="">` : fileIconSvg(f.ext);
      html += `<div class="row ${sel}" data-file="${escapeHtml(f.relPath)}">
        <div class="name-cell">${thumb}<span>${escapeHtml(f.name)}${star?' <span class="star-inline">★</span>':''}</span></div>
        <div>${formatDate(f.updated)}</div>
        <div>${fileTypeLabel(f.ext)}</div>
        <div>${formatBytes(f.size)}</div>
      </div>`;
    }
    html += '</div>';
    filearea.innerHTML = html;
  }
  attachItemHandlers();
  updateSelection();
}

function attachItemHandlers(){
  const t=activeTab();
  // Folders: double click to enter, right-click to context menu, single click selects (no select for folders here, just navigate on dblclick)
  filearea.querySelectorAll('[data-folder]').forEach(el=>{
    el.addEventListener('dblclick',()=>navigateTo(el.dataset.path));
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      showCtxMenuFolder(e.clientX, e.clientY, el.dataset.folder, el.dataset.path);
    });
  });
  // Files
  filearea.querySelectorAll('[data-file]').forEach(el=>{
    const rel=el.dataset.file;
    el.addEventListener('click',e=>{
      if(e.ctrlKey||e.metaKey){ t.selected.has(rel)?t.selected.delete(rel):t.selected.add(rel); }
      else if(e.shiftKey){ t.selected.add(rel); }
      else { t.selected.clear(); t.selected.add(rel); }
      render();
    });
    // Double click -> show context menu (DO NOT open link)
    el.addEventListener('dblclick',e=>{
      e.preventDefault();
      t.selected.clear(); t.selected.add(rel);
      render();
      showCtxMenuFile(e.clientX, e.clientY, rel);
    });
    el.addEventListener('contextmenu',e=>{
      e.preventDefault();
      if(!t.selected.has(rel)){ t.selected.clear(); t.selected.add(rel); render(); }
      showCtxMenuFile(e.clientX, e.clientY, rel);
    });
  });
}

function updateSelection(){
  const t=activeTab(); const n=t?t.selected.size:0;
  $('cmd-download').disabled = n===0;
  $('cmd-delete').disabled = n===0;
  $('cmd-zip').disabled = n===0;
  selectedInfo.textContent = n>0?`${n} selected`:'';
  // nav arrow states
  $('nav-back').disabled = !t || t.historyIdx<=0;
  $('nav-forward').disabled = !t || t.historyIdx>=t.history.length-1;
  $('nav-up').disabled = !t || !t.path;
}

function showCtxMenuFile(x,y,relPath){
  const t=activeTab();

  ctxMenu.innerHTML='';
  if(single){
    ctxMenu.appendChild(buildCtxItem(ICO.open,'Open',()=>window.open(single.url,'_blank')));
  }
  ctxMenu.appendChild(buildCtxItem(ICO.download,`Download${selFiles.length>1?` (${selFiles.length})`:''}`,()=>{
    selFiles.forEach(f=>window.open(f.url,'_blank'));
  }));
  if(single){
    ctxMenu.appendChild(buildCtxItem(ICO.copy,'Copy link',async()=>{
      try{ await navigator.clipboard.writeText(single.url); showToast('Link copied'); }catch{ showToast('Copy failed'); }
    }));

    ctxMenu.appendChild(buildCtxItem(ICO.star, starred?'Unstar':'Star', ()=>{
      toggleStar(single.path); showToast(starred?'Removed star':'Starred'); render();
    }));

  ctxMenu.appendChild(document.createElement('div')).className='ctx-sep';
  ctxMenu.appendChild(buildCtxItem(ICO.trash,`Delete${selFiles.length>1?` (${selFiles.length})`:''}`,()=>deleteFiles(selFiles),{danger:true}));

}

function showCtxMenuFolder(x,y,name,path){

}

function openModal({title, desc, value, ok}){
  $('modal-title').textContent = title;
  $('modal-desc').textContent = desc || '';
  $('modal-input').value = value || '';
  modalOverlay.classList.add('show');
  setTimeout(()=>$('modal-input').focus(),50);
  const cleanup=()=>{ modalOverlay.classList.remove('show'); $('modal-ok').onclick=null; $('modal-cancel').onclick=null; $('modal-input').onkeydown=null; };
  $('modal-ok').onclick = async()=>{ const v=$('modal-input').value.trim(); if(!v)return; cleanup(); await ok(v); };
  $('modal-cancel').onclick = cleanup;
  $('modal-input').onkeydown = e=>{ if(e.key==='Enter') $('modal-ok').click(); if(e.key==='Escape') cleanup(); };
}

function openRenameModal(file){
  openModal({title:'Rename', desc:`Rename "${file.name}"`, value:file.name, ok:async(newName)=>{
    if(newName===file.name) return;
    statusText.textContent='Renaming...';
    const t=activeTab();
    const dir = `${userId}${t.path?'/'+t.path:''}`;
    const fromPath = `${dir}/${file.name}`;
    const toPath = `${dir}/${newName}`;
    const { error } = await supabase.storage.from(BUCKET).move(fromPath, toPath);
    if(error){ showToast('❌ '+error.message); statusText.textContent='Error'; return; }
    // migrate star
    const s=getStarred(); if(s.has(fromPath)){ s.delete(fromPath); s.add(toPath); setStarred(s); }
    showToast('Renamed'); await loadCurrentTab();
  }});
}

function openRenameFolderModal(name, path){
  openModal({title:'Rename folder', desc:`Rename "${name}". This will move all files inside.`, value:name, ok:async(newName)=>{
    if(newName===name) return;
    statusText.textContent='Renaming folder...';
    const t=activeTab();
    const oldPrefix = `${userId}${t.path?'/'+t.path:''}/${name}`;
    const newPrefix = `${userId}${t.path?'/'+t.path:''}/${newName}`;
    // List all files under oldPrefix recursively, move each
    const allPaths = await listAllFiles(oldPrefix);
    for(const p of allPaths){
      const sub = p.slice(oldPrefix.length);
      await supabase.storage.from(BUCKET).move(p, newPrefix+sub);
    }
    showToast('Folder renamed'); await loadCurrentTab();
  }});
}

function openNewFolderModal(){
  openModal({title:'New folder', desc:'Folders in cloud storage are virtual; we create a placeholder file inside.', value:'New folder', ok:async(name)=>{
    const t=activeTab();
    const path = `${userId}${t.path?'/'+t.path:''}/${name}/.emptyFolderPlaceholder`;
    const blob = new Blob([''], {type:'text/plain'});

// ============ FILE OPS ============
async function listAllFiles(prefix){
  // prefix is full path inside bucket, e.g. "uid/folder"
  const out=[];
  async function walk(p){
    const { data, error } = await supabase.storage.from(BUCKET).list(p, {limit:1000});
    if(error) return;
    for(const e of data||[]){
      if(e.name==='.emptyFolderPlaceholder'){ out.push(`${p}/${e.name}`); continue; }
      if(!e.id || e.metadata===null){ await walk(`${p}/${e.name}`); }
      else out.push(`${p}/${e.name}`);
    }
  }
  await walk(prefix);
  return out;
}

async function deleteFiles(files){
  if(!files.length) return;
  if(!confirm(`Delete ${files.length} file(s)? Cannot undo.`)) return;
  statusText.textContent='Deleting…';
  const paths = files.map(f=>f.path);
  const { error } = await supabase.storage.from(BUCKET).remove(paths);
  if(error){ showToast('❌ '+error.message); statusText.textContent='Error'; return; }
  // remove stars
  const s=getStarred(); paths.forEach(p=>s.delete(p)); setStarred(s);
  showToast(`🗑️ Deleted ${files.length} file(s)`);
  activeTab().selected.clear();
  await loadCurrentTab();
}

async function deleteFolder(path, name){
  if(!confirm(`Delete folder "${name}" and ALL its contents? Cannot undo.`)) return;
  statusText.textContent='Deleting folder…';
  const t=activeTab();
  const prefix = `${userId}${t.path?'/'+t.path:''}/${name}`;
  const all = await listAllFiles(prefix);
  if(all.length){
    const { error } = await supabase.storage.from(BUCKET).remove(all);
    if(error){ showToast('❌ '+error.message); return; }
  }
  showToast(`🗑️ Folder deleted`); await loadCurrentTab();
}

async function zipFiles(files){
  if(!files.length || !window.JSZip) return;
  statusText.textContent='Compressing…';
  showToast('📦 Building ZIP…');
  const zip = new JSZip();
  for(const f of files){
    try{
      const res = await fetch(f.url);
      const blob = await res.blob();
      zip.file(f.name, blob);
    }catch(e){ console.error(e); }
  }
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = files.length===1 ? files[0].name+'.zip' : `archive-${Date.now()}.zip`;
  a.click(); URL.revokeObjectURL(url);
  statusText.textContent='Ready';
  showToast('✅ ZIP ready');
}

async function zipFolder(path, name){
  statusText.textContent='Compressing folder…';
  showToast('📦 Building ZIP…');
  const t=activeTab();
  const prefix = `${userId}${t.path?'/'+t.path:''}/${name}`;
  const all = await listAllFiles(prefix);
  const zip = new JSZip();
  for(const fullPath of all){
    if(fullPath.endsWith('.emptyFolderPlaceholder')) continue;
    const rel = fullPath.slice(prefix.length+1);
    const { data:{publicUrl} } = supabase.storage.from(BUCKET).getPublicUrl(fullPath);
    try{
      const res = await fetch(publicUrl);
      const blob = await res.blob();
      zip.file(rel, blob);
    }catch(e){ console.error(e); }
  }
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${name}.zip`;
  a.click(); URL.revokeObjectURL(url);
  statusText.textContent='Ready';
  showToast('✅ ZIP ready');
}

async function handleFiles(fileList){
  if(!userId || !fileList?.length) return;
  const files=Array.from(fileList);
  const t=activeTab();
  const dir = `${userId}${t.path?'/'+t.path:''}`;
  statusText.textContent=`Uploading ${files.length}...`;
  let failed=0;
  for(const file of files){
    const path = `${dir}/${file.name}`;
    const { error } = await supabase.storage.from(BUCKET).upload(path, file, {upsert:true});
    if(error){ failed++; console.error(error); }
  }
  filePicker.value='';
  showToast(failed?`⚠️ ${failed} failed`:`✅ ${files.length} uploaded`);
  statusText.textContent='Upload complete';
  await loadCurrentTab();
}

});
$('cmd-delete').addEventListener('click',()=>{
  const t=activeTab();
  deleteFiles(t.files.filter(f=>t.selected.has(f.relPath)));
});
$('cmd-zip').addEventListener('click',()=>{
  const t=activeTab();
  zipFiles(t.files.filter(f=>t.selected.has(f.relPath)));
});
$('cmd-help').addEventListener('click',()=>{
  alert('DigiLocker — Tips\n\n• Right-click or DOUBLE-click a file for options (Star, Rename, Compress, Delete…)\n• Double-click a folder to open it\n• Ctrl/Cmd+click to multi-select\n• Drag files into the window to upload\n• Use + in the tab bar to open more tabs\n• Sidebar filters: Starred, Recent, Pictures, Documents, etc.');
});

searchInput.addEventListener('input',()=>{ const t=activeTab(); if(!t)return; t.search=searchInput.value; render(); });

document.querySelectorAll('.view-toggle button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const t=activeTab(); if(t){ t.view=btn.dataset.view; render(); }
  });
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(authScreen.classList.contains('hidden')===false) return;
  if(e.target.tagName==='INPUT' || e.target.tagName==='TEXTAREA') return;
  if(e.key==='Delete'){ const t=activeTab(); deleteFiles(t.files.filter(f=>t.selected.has(f.relPath))); }
  if((e.ctrlKey||e.metaKey) && e.key==='a'){ e.preventDefault(); const t=activeTab(); t.files.forEach(f=>t.selected.add(f.relPath)); render(); }
  if((e.ctrlKey||e.metaKey) && e.key==='t'){ e.preventDefault(); $('tab-add').click(); }
  if((e.ctrlKey||e.metaKey) && e.key==='w'){ e.preventDefault(); const cur=document.querySelector('.tab.active .tab-close'); cur?.click(); }
  if(e.key==='F2'){ const t=activeTab(); const sel=[...t.selected]; if(sel.length===1){ const f=t.files.find(x=>x.relPath===sel[0]); if(f) openRenameModal(f); } }
});
</script>
</body>
</html>
