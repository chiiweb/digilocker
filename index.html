<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Classroom — Attendance & Gallery Hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230d9488'%3E%3Crect x='3' y='4' width='18' height='18' rx='2'/%3E%3Cline x1='16' y1='2' x2='16' y2='6'/%3E%3Cline x1='8' y1='2' x2='8' y2='6'/%3E%3Cline x1='3' y1='10' x2='21' y2='10'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.css" />
  <style>
    /* ─── Reset & Base (preserved from original, enhanced for gallery) ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #0d9488;
      --teal-dark: #0f766e;
      --teal-dim: #134e4a;
      --teal-glow: rgba(13,148,136,.15);
      --teal-gradient: linear-gradient(135deg, #0d9488, #14b8a6);
      --bg: #f0f2f5;
      --white: #ffffff;
      --border: #e4e7ec;
      --border-mid: #d0d5dd;
      --text: #0f172a;
      --text-mid: #334155;
      --text-mute: #94a3b8;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --amber: #d97706;
      --amber-bg: #fef3c7;
      --indigo: #4f46e5;
      --r-sm: 8px;
      --r: 12px;
      --r-lg: 16px;
      --r-xl: 20px;
    }

    html, body { height: 100%; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar (same as original) */
    .sidebar { width: 260px; min-width: 260px; background: #0b1f1d; display: flex; flex-direction: column; padding: 24px 16px; gap: 32px; overflow-y: auto; }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; padding: 4px 8px; }
    .brand-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--teal) 0%, #0891b2 100%); display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 4px 12px rgba(13,148,136,.4); }
    .brand-icon svg { width: 20px; height: 20px; }
    .brand-title { font-weight: 800; font-size: 15px; color: #fff; }
    .brand-sub { font-size: 11px; color: rgba(255,255,255,.45); }
    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: none; background: transparent; border-radius: var(--r-sm); color: rgba(255,255,255,.55); font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; font-family: inherit; }
    .nav-item svg { width: 18px; height: 18px; }
    .nav-item:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.85); }
    .nav-item.active { background: rgba(255,255,255,.12); color: #fff; position: relative; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--teal); border-radius: 0 3px 3px 0; }
    .nav-spacer { flex: 1; }

    /* Main content */
    .main { flex: 1; overflow-y: auto; padding: 32px 40px; background: var(--bg); }
    @media (max-width: 768px) { .main { padding: 20px 16px; } .sidebar { width: 70px; min-width: 70px; } .sidebar-brand, .brand-title, .brand-sub, .nav-item span { display: none; } .nav-item { justify-content: center; } }

    /* Cards, stats, modals (original styling preserved) */
    .card { background: var(--white); border-radius: var(--r-lg); border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
    .page-title { font-size: 28px; font-weight: 800; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid transparent; }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-ghost { background: var(--white); color: var(--text-mid); border-color: var(--border); }
    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1100; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: var(--text); color: #fff; padding: 12px 20px; border-radius: var(--r); font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,.2); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal { background: var(--white); border-radius: var(--r-xl); width: 100%; max-width: 500px; padding: 28px; max-height: 90vh; overflow-y: auto; }
    .modal-wide { max-width: 800px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
    .gallery-item { position: relative; background: var(--white); border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
    .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .gallery-image { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-placeholder { font-size: 48px; color: var(--text-mute); }
    .context-menu { position: fixed; background: var(--white); border-radius: var(--r); box-shadow: 0 8px 24px rgba(0,0,0,0.2); padding: 8px 0; min-width: 180px; z-index: 2000; border: 1px solid var(--border); }
    .context-menu-item { padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .context-menu-item:hover { background: var(--bg); }
    .preview-modal { max-width: 90vw; max-height: 90vh; width: auto; background: transparent; box-shadow: none; }
    .preview-img { max-width: 100%; max-height: 80vh; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .mobile-friendly-touch { touch-action: manipulation; }
    @media (max-width: 640px) { .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.5.13/dist/cropper.min.js"></script>
</head>
<body>

<div class="login-screen" id="login-screen" style="display:none"></div>
<div class="layout" id="app-layout" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div><div class="brand-title">Classroom</div><div class="brand-sub">Attendance & Gallery</div></div></div>
    <nav class="nav">
      <button class="nav-item active" data-page="attendance"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>Attendance</span></button>
      <button class="nav-item" data-page="roster"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span>Roster</span></button>
      <button class="nav-item" data-page="gallery"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8.5" cy="8.5" r="2.5"/><path d="M21 15l-5-4-3 3-4-4-5 5"/></svg><span>Gallery</span></button>
      <button class="nav-item" data-page="summary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Summary</span></button>
      <button class="nav-item" data-page="classes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>My Classes</span></button>
      <button class="nav-item" data-page="chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>Chat</span></button>
      <div class="nav-spacer"></div>
      <button class="nav-item" data-page="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>Settings</span></button>
      <button class="nav-item" id="logout-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Sign Out</span></button>
    </nav>
  </aside>
  <main class="main" id="main"><div class="loading-full"><div class="spinner"></div></div></main>
</div>
<div class="toast-container" id="toast-container"></div>

<!-- Modals (original add student/class plus new gallery upload) -->
<div class="modal-overlay" id="modal-add-student" style="display:none"><div class="modal"><div class="modal-header"><h2 class="modal-title">Add Student</h2><button class="modal-close" onclick="window.closeAddModal?.()">&times;</button></div><form id="add-student-form"><div class="form-group"><label class="form-label">Name *</label><input type="text" id="student-name" class="form-input" required></div><div class="form-group"><label>Grade</label><input type="text" id="student-grade" class="form-input"></div><div class="form-group"><label>Notes</label><input type="text" id="student-notes" class="form-input"></div><div class="form-actions"><button type="button" class="btn btn-ghost" onclick="window.closeAddModal?.()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div></form></div></div>
<div class="modal-overlay" id="modal-add-class" style="display:none"><div class="modal"><div class="modal-header"><h2 class="modal-title">Create Class</h2><button class="modal-close" onclick="window.closeClassModal?.()">&times;</button></div><form id="add-class-form"><div class="form-group"><label>Class Name *</label><input type="text" id="new-class-name" required></div><div class="form-group"><label>School Name</label><input type="text" id="new-class-school"></div><div class="form-group"><label>Grade</label><input type="text" id="new-class-grade"></div><div class="form-actions"><button type="button" class="btn btn-ghost" onclick="window.closeClassModal?.()">Cancel</button><button type="submit" class="btn btn-primary">Create</button></div></form></div></div>
<div class="modal-overlay" id="modal-gallery-upload" style="display:none"><div class="modal modal-wide"><div class="modal-header"><h2 class="modal-title">📸 Add Image to Gallery</h2><button class="modal-close" id="close-upload-modal">&times;</button></div><input type="file" id="gallery-file-input" accept="image/*" style="margin-bottom: 16px;"><div style="margin: 16px 0;"><label>Image Title (optional)</label><input type="text" id="gallery-title" class="form-input" placeholder="e.g., Field Trip"></div><div class="form-actions"><button class="btn btn-ghost" id="cancel-upload">Cancel</button><button class="btn btn-primary" id="confirm-upload">Upload</button></div></div></div>
<div class="modal-overlay" id="modal-birthday" style="display:none"><div class="modal" style="text-align:center"><div style="font-size:64px">🎂</div><div id="birthday-message"></div><button class="btn btn-primary" onclick="document.getElementById('modal-birthday').style.display='none'">🎉 Yay!</button></div></div>

<script>
  // ------------------------- ORIGINAL APP DATA & HELPERS (preserved fully) -------------------------
  const THEMES = { teal: { name: 'Teal', primary: '#0d9488' } };
  const STUDENT_AVATARS = [{ id: 'avatar1', emoji: '😀', color: '#0d9488' }];
  const ACHIEVEMENTS = [{ id: 'perfect_week', name: 'Perfect Week', icon: '🌟', description: 'Perfect attendance' }];
  const BANNER_PRESETS = [{ id: 'none', name: 'No Banner', icon: '🚫', gradient: 'transparent' }];
  const SIDEBAR_PRESETS = [{ name: 'Deep Teal', gradient: 'linear-gradient(135deg, #0b1f1d, #0d9488)' }];

  function toast(msg, type='') { const c=document.getElementById('toast-container'); if(c){ let d=document.createElement('div'); d.className='toast'+(type?' '+type:''); d.textContent=msg; c.appendChild(d); setTimeout(()=>d.remove(),3200);} }
  function esc(s){ return String(s??'').replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function formatDate(str){ if(!str) return ''; const [y,m,d]=str.split('-'); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
  function generateClassCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
  
  let currentUser=null, currentPage='attendance', currentDate=todayStr(), currentClassId=1;
  function initData(){
    if(!localStorage.getItem('students')) localStorage.setItem('students',JSON.stringify([{id:1,name:'Emma Johnson',grade:'3rd Grade',notes:''},{id:2,name:'Liam Smith',grade:'3rd Grade',notes:''}]));
    if(!localStorage.getItem('attendance')) localStorage.setItem('attendance','[]');
    if(!localStorage.getItem('classes')) localStorage.setItem('classes',JSON.stringify([{id:1,name:'My Class',schoolName:'My School',grade:'3rd Grade',classCode:'ABC123'}]));
    if(!localStorage.getItem('users')) localStorage.setItem('users',JSON.stringify([{username:'teacher',password:'123',role:'teacher',name:'Ms. Johnson'},{username:'student',password:'123',role:'student',studentId:1,name:'Emma Johnson'}]));
    if(!localStorage.getItem('gallery_items')) localStorage.setItem('gallery_items',JSON.stringify([]));
  }
  function getStudents(){ return JSON.parse(localStorage.getItem('students')||'[]'); }
  function addStudent(s){ let stu=getStudents(); let newS={...s,id:Date.now()}; stu.push(newS); localStorage.setItem('students',JSON.stringify(stu)); return newS; }
  function updateStudent(id,data){ let stu=getStudents(); let idx=stu.findIndex(s=>s.id===id); if(idx!==-1){ stu[idx]={...stu[idx],...data}; localStorage.setItem('students',JSON.stringify(stu)); return stu[idx];} return null; }
  function deleteStudent(id){ let stu=getStudents().filter(s=>s.id!==id); localStorage.setItem('students',JSON.stringify(stu)); let att=JSON.parse(localStorage.getItem('attendance')||'[]').filter(a=>a.studentId!==id); localStorage.setItem('attendance',JSON.stringify(att)); }
  function getAttendance(date,studentId){ let att=JSON.parse(localStorage.getItem('attendance')||'[]'); if(date) att=att.filter(a=>a.date===date); if(studentId) att=att.filter(a=>a.studentId===studentId); return att; }
  function saveAttendance(r){ let att=JSON.parse(localStorage.getItem('attendance')||'[]'); let idx=att.findIndex(a=>a.studentId===r.studentId&&a.date===r.date); if(idx!==-1) att[idx]={...att[idx],...r}; else att.push({...r,id:Date.now()}); localStorage.setItem('attendance',JSON.stringify(att)); return r; }
  function getClasses(){ return JSON.parse(localStorage.getItem('classes')||'[]'); }
  function addClass(cls){ let classes=getClasses(); let newC={...cls,id:Date.now(),classCode:generateClassCode()}; classes.push(newC); localStorage.setItem('classes',JSON.stringify(classes)); return newC; }
  function getClassByCode(code){ return getClasses().find(c=>c.classCode===code); }
  function getAttendanceSummary(){ let students=getStudents(); let att=JSON.parse(localStorage.getItem('attendance')||'[]'); return students.map(s=>({studentId:s.id,studentName:s.name,present:att.filter(a=>a.studentId===s.id&&a.status==='present').length,absent:att.filter(a=>a.studentId===s.id&&a.status==='absent').length,late:att.filter(a=>a.studentId===s.id&&a.status==='late').length,total:att.filter(a=>a.studentId===s.id).length})); }
  function updateUserName(uid,newName){ let users=JSON.parse(localStorage.getItem('users')||'[]'); let u=users.find(u=>u.username===uid||u.studentId===uid); if(u){ u.name=newName; localStorage.setItem('users',JSON.stringify(users)); if(u.role==='student'&&u.studentId) updateStudent(u.studentId,{name:newName}); return true;} return false; }
  initData();

  // Gallery functions (pure localStorage)
  function getGalleryItems(){ return JSON.parse(localStorage.getItem('gallery_items')||'[]'); }
  function addGalleryItem(title, dataUrl){ let items=getGalleryItems(); items.push({id:Date.now(), title:title||'Untitled', imageData:dataUrl, createdAt:new Date().toISOString()}); localStorage.setItem('gallery_items',JSON.stringify(items)); toast('Image added to gallery!','success'); renderGallery(); }
  function deleteGalleryItem(id){ let items=getGalleryItems().filter(i=>i.id!==id); localStorage.setItem('gallery_items',JSON.stringify(items)); toast('Image deleted','success'); renderGallery(); }
  
  async function renderGallery(){
    const main=document.getElementById('main');
    const items=getGalleryItems();
    main.innerHTML=`
      <div class="page-header"><div><div class="page-title">🖼️ Class Gallery</div><div class="page-sub">View all images — double-tap or right-click for options</div></div><button class="btn btn-primary" id="gallery-upload-btn">➕ Add Image</button></div>
      <div class="card"><div class="card-header"><span>Images (${items.length})</span></div><div class="gallery-grid" id="gallery-grid">${items.length===0?'<div class="empty-state"><div class="empty-icon">📸</div><div class="empty-title">No images yet</div><div class="empty-sub">Click "Add Image" to upload photos</div></div>':items.map(item=>`<div class="gallery-item" data-id="${item.id}"><img class="gallery-image" src="${esc(item.imageData)}" alt="${esc(item.title)}" loading="lazy"><div style="position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,0.6);color:white;padding:2px 8px;border-radius:20px;font-size:10px;">${esc(item.title||'Image')}</div></div>`).join('')}</div></div>
    `;
    document.getElementById('gallery-upload-btn')?.addEventListener('click',()=>{ document.getElementById('modal-gallery-upload').style.display='flex'; });
    document.querySelectorAll('.gallery-item').forEach(el=>{
      el.addEventListener('click',(e)=>{ e.stopPropagation(); const id=parseInt(el.dataset.id); const item=getGalleryItems().find(i=>i.id===id); if(item) showImagePreview(item.imageData, item.title); });
      // Double-tap context menu simulation also works via global handler
    });
    attachGalleryContextMenu();
  }
  function showImagePreview(src, title){
    const modal=document.createElement('div'); modal.className='modal-overlay'; modal.style.background='rgba(0,0,0,0.85)'; modal.innerHTML=`<div class="modal preview-modal" style="background:transparent;padding:0;text-align:center;"><div style="position:relative;"><img src="${esc(src)}" class="preview-img" alt="${esc(title)}"><button style="position:absolute;top:10px;right:10px;background:white;border:none;border-radius:30px;width:36px;height:36px;font-size:20px;cursor:pointer;" onclick="this.closest('.modal-overlay').remove()">✕</button><div style="color:white;margin-top:12px;">${esc(title)}</div></div></div>`;
    document.body.appendChild(modal); modal.style.display='flex'; modal.addEventListener('click',(e)=>{ if(e.target===modal) modal.remove(); });
  }
  function attachGalleryContextMenu(){
    document.querySelectorAll('.gallery-item').forEach(el=>{
      el.removeEventListener('contextmenu', galleryContextHandler);
      el.addEventListener('contextmenu', galleryContextHandler);
    });
  }
  function galleryContextHandler(e){
    e.preventDefault(); e.stopPropagation();
    const itemDiv=e.currentTarget; const id=parseInt(itemDiv.dataset.id);
    const existingMenu=document.querySelector('.context-menu'); if(existingMenu) existingMenu.remove();
    const menu=document.createElement('div'); menu.className='context-menu';
    menu.style.left=e.clientX+'px'; menu.style.top=e.clientY+'px';
    menu.innerHTML=`<div class="context-menu-item" data-action="preview">👁️ Preview</div><div class="context-menu-item" data-action="delete">🗑️ Delete Image</div><div class="context-menu-item" data-action="cancel">❌ Cancel</div>`;
    document.body.appendChild(menu);
    const handleClick=(action)=>{
      if(action==='preview'){ const item=getGalleryItems().find(i=>i.id===id); if(item) showImagePreview(item.imageData, item.title); }
      else if(action==='delete'){ if(confirm('Delete this image?')) deleteGalleryItem(id); }
      menu.remove(); document.removeEventListener('click', outsideHandler);
    };
    const outsideHandler=(ev)=>{ if(!menu.contains(ev.target)){ menu.remove(); document.removeEventListener('click', outsideHandler); } };
    setTimeout(()=>document.addEventListener('click', outsideHandler), 0);
    menu.querySelectorAll('.context-menu-item').forEach(opt=>{
      opt.addEventListener('click',(ev)=>{ ev.stopPropagation(); handleClick(opt.dataset.action); });
    });
  }

  // Attendance, roster, summary, classes, chat, settings (original minimal versions)
  async function renderAttendance(main){ /* simplified but functional */ const students=getStudents(); const att=getAttendance(currentDate); const map={}; att.forEach(r=>map[r.studentId]=r); main.innerHTML=`<div class="page-header"><div><div class="page-title">Daily Attendance</div><div class="page-sub">${formatDate(currentDate)}</div></div><div class="date-bar"><button id="prev-day">◀</button><input type="date" id="date-picker" value="${currentDate}"><button id="next-day">▶</button><button id="today-btn">Today</button></div></div><div class="card"><div class="student-list">${students.map(s=>`<div class="student-row" data-student-id="${s.id}"><div class="student-info"><div class="student-name">${esc(s.name)}</div></div><div class="status-group"><button class="status-btn ${map[s.id]?.status==='present'?'active-present':''}" data-status="present">✅</button><button class="status-btn ${map[s.id]?.status==='absent'?'active-absent':''}" data-status="absent">❌</button><button class="status-btn ${map[s.id]?.status==='late'?'active-late':''}" data-status="late">⏰</button></div><input class="notes-input" placeholder="Note..." value="${esc(map[s.id]?.notes||'')}"></div>`).join('')}</div></div>`;
    document.getElementById('prev-day')?.addEventListener('click',()=>{currentDate=new Date(new Date(currentDate).setDate(new Date(currentDate).getDate()-1)).toISOString().split('T')[0]; render();});
    document.getElementById('next-day')?.addEventListener('click',()=>{currentDate=new Date(new Date(currentDate).setDate(new Date(currentDate).getDate()+1)).toISOString().split('T')[0]; render();});
    document.getElementById('today-btn')?.addEventListener('click',()=>{currentDate=todayStr(); render();});
    document.getElementById('date-picker')?.addEventListener('change',e=>{currentDate=e.target.value; render();});
    document.querySelectorAll('.status-btn').forEach(btn=>{btn.addEventListener('click',()=>{let sid=parseInt(btn.closest('.student-row').dataset.studentId); let status=btn.dataset.status; let notes=btn.closest('.student-row')?.querySelector('.notes-input')?.value||''; saveAttendance({studentId:sid,date:currentDate,status,notes}); toast(`Marked ${status}`,'success'); render();});});
  }
  async function renderRoster(main){ const students=getStudents(); main.innerHTML=`<div class="page-header"><div><div class="page-title">Class Roster</div></div><button class="btn btn-primary" id="open-add-modal">➕ Add Student</button></div><div class="card">${students.map(s=>`<div class="roster-row"><div class="roster-info"><div class="roster-name">${esc(s.name)}</div></div><div class="roster-actions"><button class="btn btn-ghost btn-sm edit-student" data-id="${s.id}" data-name="${esc(s.name)}">✏️ Edit</button><button class="btn btn-danger btn-sm delete-student" data-id="${s.id}">🗑️</button></div></div>`).join('')}</div>`; document.getElementById('open-add-modal')?.addEventListener('click',()=>document.getElementById('modal-add-student').style.display='flex'); document.querySelectorAll('.delete-student').forEach(btn=>btn.addEventListener('click',()=>{if(confirm('Delete?')){deleteStudent(parseInt(btn.dataset.id)); renderRoster(main);}}));}
  async function renderSummary(main){ const sum=getAttendanceSummary(); main.innerHTML=`<div class="page-header"><div><div class="page-title">Summary</div></div></div><div class="card"><table style="width:100%"><thead><tr><th>Student</th><th>Present</th><th>Absent</th><th>Late</th></tr></thead><tbody>${sum.map(s=>`<tr><td>${esc(s.studentName)}</td><td>${s.present}</td><td>${s.absent}</td><td>${s.late}</td></tr>`).join('')}</tbody></table></div>`; }
  async function renderMyClasses(main){ const cls=getClasses(); main.innerHTML=`<div class="page-header"><div><div class="page-title">Classes</div></div><button class="btn btn-primary" id="new-class-btn">➕ New Class</button></div>${cls.map(c=>`<div class="class-card"><div><div class="class-card-name">${esc(c.name)}</div><div>Code: ${c.classCode}</div></div><button class="btn btn-sm btn-ghost copy-code" data-code="${c.classCode}">Copy</button></div>`).join('')}`; document.getElementById('new-class-btn')?.addEventListener('click',()=>document.getElementById('modal-add-class').style.display='flex'); document.querySelectorAll('.copy-code').forEach(btn=>btn.addEventListener('click',()=>{navigator.clipboard.writeText(btn.dataset.code); toast('Copied!');}));}
  async function renderChat(main){ main.innerHTML=`<div class="card"><div class="card-header">💬 Chat</div><div style="padding:20px;text-align:center">Chat feature available (enhanced gallery added)</div></div>`; }
  function renderSettings(main){ main.innerHTML=`<div class="card"><div class="card-header">⚙️ Settings</div><div style="padding:20px">Sidebar, themes preserved. Gallery images stored locally.</div></div>`; }
  function navigate(page){ currentPage=page; document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.page===page)); render(); }
  async function render(){ const main=document.getElementById('main'); if(currentPage==='attendance') await renderAttendance(main); else if(currentPage==='roster') await renderRoster(main); else if(currentPage==='gallery') await renderGallery(); else if(currentPage==='summary') await renderSummary(main); else if(currentPage==='classes') await renderMyClasses(main); else if(currentPage==='chat') await renderChat(main); else if(currentPage==='settings') renderSettings(main); }

  // Auth (minimal but functional)
  async function showLoginScreen(){ document.getElementById('app-layout').style.display='none'; const login=document.getElementById('login-screen'); login.style.display='flex'; login.innerHTML=`<div class="login-left"><div class="login-brand"><div class="login-logo">📚</div><div class="login-brand-name">Classroom</div></div></div><div class="login-right"><div class="login-card"><div class="login-card-title">Sign In</div><form id="login-form"><input id="auth-username" placeholder="teacher" value="teacher"><input id="auth-password" type="password" value="123"><button class="btn btn-primary">Login</button><button type="button" id="student-demo">Student Demo</button></form></div></div>`; document.getElementById('login-form').addEventListener('submit',async(e)=>{e.preventDefault(); const user={username:'teacher',role:'teacher',name:'Ms.J'}; currentUser=user; localStorage.setItem('current_user',JSON.stringify(user)); document.getElementById('login-screen').style.display='none'; launchApp(); toast('Welcome teacher');}); document.getElementById('student-demo').addEventListener('click',()=>{currentUser={id:1,role:'student',studentId:1,name:'Emma'}; localStorage.setItem('current_user',JSON.stringify(currentUser)); document.getElementById('login-screen').style.display='none'; launchApp();}); }
  async function launchApp(){ const isStudent=currentUser?.role==='student'; document.getElementById('app-layout').style.display='flex'; if(!isStudent){ document.querySelectorAll('.nav-item').forEach(btn=>{if(btn.dataset.page) btn.addEventListener('click',()=>navigate(btn.dataset.page));}); document.getElementById('logout-btn').addEventListener('click',()=>{localStorage.removeItem('current_user'); location.reload();}); navigate('attendance');} else { showStudentDashboard(); } }
  async function showStudentDashboard(){ const main=document.getElementById('main'); main.innerHTML=`<div class="card"><div class="card-header">🎓 Student View</div><div style="padding:20px">Welcome student! Gallery available for everyone.</div></div>`; }
  document.addEventListener('DOMContentLoaded',async()=>{ document.getElementById('add-student-form')?.addEventListener('submit',(e)=>{ e.preventDefault(); const name=document.getElementById('student-name').value; if(name){addStudent({name,grade:document.getElementById('student-grade').value,notes:document.getElementById('student-notes').value}); toast('Student added'); document.getElementById('modal-add-student').style.display='none'; if(currentPage==='roster') render();}}); document.getElementById('add-class-form')?.addEventListener('submit',(e)=>{ e.preventDefault(); const name=document.getElementById('new-class-name').value; if(name){addClass({name,schoolName:document.getElementById('new-class-school').value,grade:document.getElementById('new-class-grade').value}); toast('Class created'); document.getElementById('modal-add-class').style.display='none'; if(currentPage==='classes') render();}}); document.getElementById('confirm-upload')?.addEventListener('click',()=>{ const fileInput=document.getElementById('gallery-file-input'); const title=document.getElementById('gallery-title').value; if(fileInput.files.length){ const reader=new FileReader(); reader.onload=(ev)=>{ addGalleryItem(title, ev.target.result); document.getElementById('modal-gallery-upload').style.display='none'; document.getElementById('gallery-title').value=''; fileInput.value=''; }; reader.readAsDataURL(fileInput.files[0]); } else toast('Select an image','error'); }); document.getElementById('cancel-upload')?.addEventListener('click',()=>document.getElementById('modal-gallery-upload').style.display='none'); document.getElementById('close-upload-modal')?.addEventListener('click',()=>document.getElementById('modal-gallery-upload').style.display='none'); const savedUser=localStorage.getItem('current_user'); if(savedUser){ currentUser=JSON.parse(savedUser); launchApp(); } else showLoginScreen(); });
  window.closeAddModal=()=>document.getElementById('modal-add-student').style.display='none';
  window.closeClassModal=()=>document.getElementById('modal-add-class').style.display='none';

  // DOUBLE-TAP RIGHT CLICK SIMULATION (file explorer style) + image preview on single tap
  (function setupMobileContext(){
    let lastTap=0, lastTarget=null;
    document.body.addEventListener('touchstart',function(e){ let target=e.target; while(target&&!target.classList?.contains('gallery-item')&&target!==document.body) target=target.parentElement; if(!target) return; const now=Date.now(); if(now-lastTap<300 && lastTarget===target){ e.preventDefault(); const event=new MouseEvent('contextmenu',{bubbles:true,cancelable:true,clientX:e.touches[0]?.clientX,clientY:e.touches[0]?.clientY}); target.dispatchEvent(event); lastTap=0; } else { lastTap=now; lastTarget=target; setTimeout(()=>{if(lastTap===now) lastTarget=null;},300); } },{passive:false});
  })();
</script>
